<h4 class="title">Nutrition Information</h4>
<div class="macros-list">
	@let _calculated = calculated();

	@for (item of _calculated; track item.nutrition.type) {
		@if (item.nutrition.amount && item.nutrition.amount > 0) {
			<div class="macro-item">
				<span class="macro-label" [ngClass]="{ indent: item.indented }">{{ item.label }}</span>
				<span class="macro-value">{{ item.nutrition.amount | number: "1.0-2" }} {{ item.nutrition.unit }}</span>
			</div>
		}
	}
</div>
