@let _product = product();
@let _isLoading = isLoading();

@if (_isLoading) {
	<div class="loading-container">
		<mat-spinner diameter="64" />
	</div>
} @else {
	<div class="product-container">
		<app-page-title class="mb-2" [title]="_product?.name || 'Scan result'" />
		@if (_product) {
			<div class="content-wrapper">
				<div class="header-wrapper">
					@if (_product.images && _product.images[0].url) {
						<div
							class="product-image"
							[ngStyle]="{
								'background-image': 'url(' + _product.images[0].url + ')'
							}"
						></div>
					} @else {
						<div class="product-image missing d-flex ai-c jc-c">
							<mat-icon>broken_image</mat-icon>
						</div>
					}

					<div class="d-flex flex-column ai-c mb-2">
						<h4 class="product-name">{{ _product.name }}</h4>
						<span class="brand-name">{{ _product.brand }}</span>
					</div>
				</div>

				<mat-chip-set>
					@for (tag of nutrientTags(); track tag.name) {
						<mat-chip [ngStyle]="{ '--mdc-chip-elevated-container-color': tag.color }" class="product-tag">
							{{ tag.label }}
						</mat-chip>
					}
				</mat-chip-set>

				<button mat-flat-button class="my-2 w-100" disabled>Add to Lunch</button>

				<app-nutrition-label [nutritions]="_product.nutritions" />
			</div>
		}
	</div>
}
