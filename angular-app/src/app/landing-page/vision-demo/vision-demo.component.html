<mat-card>
	<mat-card-content>
		<div class="description">
			<h3 class="title">Counting calories, made effortless</h3>
			<h4 class="subtitle">Capture any plate, get all the macros.</h4>
		</div>
		<div class="scanner-container">
			<div class="food-track">
				@for (food of visibleFoods(); track food.id) {
					<div class="food-emoji" [@emojiState]="food.position">
						{{ food.emoji }}
					</div>
				}
			</div>
			<div class="scanner-box"></div>
		</div>
		<div class="name-display">
			<div class="typewriter">{{ textContent() }}</div>
		</div>
	</mat-card-content>
</mat-card>
