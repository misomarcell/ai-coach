<mat-card class="analytics-card">
	<mat-card-content>
		<div class="description">
			<h3 class="title">AI-powered nutrition insights</h3>
			<h4 class="subtitle">Personalized recommendations based on your data.</h4>
		</div>
	</mat-card-content>
	<div #container class="bulb-container">
		<div
			class="bulb"
			tabindex="0"
			(pointerdown)="onPointerDown($event)"
			(pointermove)="onPointerMove($event)"
			(pointerup)="onPointerUp($event)"
			(focus)="onFocus()"
			(blur)="onBlur()"
			[style.transform]="'translate(' + x() + 'px, ' + y() + 'px) scale(' + scale() + ')'"
		>
			💡
		</div>
	</div>
</mat-card>
