<div class="app-container">
	<mat-sidenav-container class="sidenav-container">
		<mat-sidenav [opened]="isMenuOpen" [mode]="'over'" class="sidenav" (closed)="isMenuOpen = false">
			<mat-nav-list>
				<a mat-list-item routerLinkActive="active-link" [routerLink]="['/home']" (click)="isMenuOpen = false">
					<mat-icon>home</mat-icon>
					<span class="nav-label">Home</span>
				</a>
				<a mat-list-item routerLinkActive="active-link" [routerLink]="['/diet-analyses']" (click)="isMenuOpen = false">
					<mat-icon>insights</mat-icon>
					<span class="nav-label">Diet analyses</span>
				</a>
				<a mat-list-item routerLinkActive="active-link" [routerLink]="['/profile']" (click)="isMenuOpen = false">
					<mat-icon>account_circle</mat-icon>
					<span class="nav-label">Profile</span>
				</a>
				<a mat-list-item routerLinkActive="active-link" [routerLink]="['/search-food']" (click)="isMenuOpen = false">
					<mat-icon>list</mat-icon>
					<span class="nav-label">Food List</span>
				</a>
				<a
					mat-list-item
					class="highlighted"
					routerLinkActive="active-link"
					[routerLink]="['/calorie-vision']"
					(click)="isMenuOpen = false"
				>
					<mat-icon>visibility</mat-icon>
					<span class="nav-label">Calorie Vision</span>
				</a>
				<a mat-list-item routerLinkActive="active-link" [routerLink]="['/integrations']" (click)="isMenuOpen = false">
					<mat-icon>link</mat-icon>
					<span class="nav-label">Integrations</span>
				</a>
				<a mat-list-item class="bottom-item" href="#" (click)="handleLogoutClick()">
					<mat-icon>logout</mat-icon>
					<span class="nav-label">Log out</span>
				</a>
			</mat-nav-list>
		</mat-sidenav>

		<mat-sidenav-content class="content">
			<mat-toolbar color="primary" class="toolbar">
				<button mat-icon-button (click)="toggleMenu()" class="menu-button">
					<mat-icon>menu</mat-icon>
				</button>
				<span class="app-title" matRipple [routerLink]="['/home']">KombuchAI</span>
			</mat-toolbar>
			<router-outlet />
		</mat-sidenav-content>
	</mat-sidenav-container>

	<div class="fab-container">
		<a mat-fab [matMenuTriggerFor]="menu">
			<mat-icon>add</mat-icon>
		</a>
	</div>

	<mat-menu #menu="matMenu">
		<button mat-menu-item routerLink="/scan">
			<mat-icon>qr_code_scanner</mat-icon>
			<span>Scan barcode</span>
		</button>
		<button mat-menu-item routerLink="/calorie-vision">
			<mat-icon>visibility</mat-icon>
			<span>Use Calorie Vision</span>
		</button>
		<button mat-menu-item routerLink="/food-list" [queryParams]="{ focus: true }">
			<mat-icon>add</mat-icon>
			<span>Add new entry</span>
		</button>
	</mat-menu>
</div>
