<app-page-title [main]="true" title="Diet Analyses" />

@let _profile = userProfile();
@let _healthProfile = healthProfile();
@if (_profile && _healthProfile) {
	<app-analysis-request-form class="mb-2" />
}

@if (analyses(); as analyses) {
	@if (analyses.length > 0) {
		<div class="result-list">
			@for (analysis of analyses; track analysis?.id) {
				<app-analysis-card [analysis]="analysis" />
			}
		</div>
	}
}
