@let _sortedNutritions = sortedNutritions();
<mat-expansion-panel class="nutrition-panel">
	<mat-expansion-panel-header>
		<mat-panel-title>See all {{ _sortedNutritions.length }} nutritions</mat-panel-title>
	</mat-expansion-panel-header>

	<div class="nutrition-list">
		@for (nutrition of _sortedNutritions; track nutrition.type) {
			<div class="nutrition-item">
				<span class="nutrition-label">{{ nutrition.type }}</span>
				<span class="nutrition-value"> {{ nutrition.amount | number: "1.0-2" }} {{ nutrition.unit }} </span>
			</div>
		}
	</div>
</mat-expansion-panel>
