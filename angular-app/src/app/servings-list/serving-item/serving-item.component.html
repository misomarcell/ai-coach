@if (serving(); as serving) {
	<div class="serving-item">
		<div class="food-info">
			@if (serving.food.isApproved) {
				<mat-icon class="verified-icon">verified</mat-icon>
			}
			<div class="food-name">
				{{ serving.food.name || "Unknown food" }}
			</div>
			<div class="food-calories">{{ getCaloriesFor(serving.food) | number: "1.0-0" }} kcal</div>
		</div>
	</div>
}
